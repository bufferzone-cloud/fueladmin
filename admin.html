        async function showLocationMap(lat, lng, title, isStation = false) {
            const modal = document.getElementById('detailModal');
            document.getElementById('modalTitle').textContent = `📍 ${title}`;
            let amenitiesHtml = '';

            if (isStation) {
                try {
                    const url =
                        `https://overpass-api.de/api/interpreter?data=[out:json];(node["amenity"](${lat-0.003},${lng-0.003},${lat+0.003},${lng+0.003});node["shop"](${lat-0.003},${lng-0.003},${lat+0.003},${lng+0.003}););out;`;
                    const res = await fetch(url);
                    const data = await res.json();
                    const amenities = new Set();
                    data.elements.forEach(el => {
                        if (el.tags) {
                            const tag = el.tags.amenity || el.tags.shop || el.tags.name || 'Amenity';
                            amenities.add(tag);
                        }
                    });
                    if (amenities.size) {
                        amenitiesHtml =
                            `<div style="margin-bottom:8px;"><strong>Nearby Amenities:</strong> ${Array.from(amenities).map(a => `<span class="badge badge-green" style="display:inline-block;margin:2px;">${escapeHtml(a.charAt(0).toUpperCase()+a.slice(1))}</span>`).join(' ')}</div>`;
                    } else {
                        amenitiesHtml =
                            `<div style="font-size:0.8rem;color:var(--gray-500);margin-bottom:8px;">No common amenities found nearby.</div>`;
                    }
                } catch (e) {
                    amenitiesHtml =
                        `<div style="font-size:0.8rem;color:var(--gray-500);margin-bottom:8px;">Could not fetch amenities.</div>`;
                }
            }

            document.getElementById('modalBody').innerHTML = `
                <div class="map-container" id="mapPopupContainer"></div>
                ${amenitiesHtml}
                <div class="address-display"><i class="fas fa-map-pin"></i> <span id="mapPopupAddress">Loading address...</span></div>
                <div style="font-size:0.8rem;color:var(--gray-500);">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
            `;
            document.getElementById('modalFooter').style.display = 'none';
            openModal('detailModal');

            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18`)
                .then(res => res.json())
                .then(data => {
                    const addr = data?.display_name || 'Unknown address';
                    document.getElementById('mapPopupAddress').textContent = addr;
                }).catch(() => {
                    document.getElementById('mapPopupAddress').textContent = 'Address unavailable';
                });

            setTimeout(() => {
                const container = document.getElementById('mapPopupContainer');
                if (!container) return;
                if (mapPopupInstance) {
                    mapPopupInstance.invalidateSize();
                    mapPopupInstance.setView([lat, lng], 15);
                } else {
                    mapPopupInstance = L.map(container).setView([lat, lng], 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '© OpenStreetMap'
                    }).addTo(mapPopupInstance);
                    L.marker([lat, lng]).addTo(mapPopupInstance).bindPopup(title).openPopup();
                }
            }, 100);
        }

        async function saveStation() {
            const name = document.getElementById('csName').value.trim();
            const manager = document.getElementById('csManager').value.trim();
            const email = document.getElementById('csEmail').value.trim();
            const phone = document.getElementById('csPhone').value.trim();
            const country = document.getElementById('csCountry').value.trim() || 'ZM';

            if (!name || !manager || !email) {
                showToast('Name, manager, email required', 'error');
                return;
            }

            let location = null;
            let password = '';
            let stationPics = [];
            let amenities = [];
            let fuelTypes = [];
            let operatingHours = '';
            let logoUrl = '',
                certUrl = '',
                zraUrl = '';

            if (stationViewMode === 'stations') {
                const locStr = document.getElementById('csLocation').value.trim();
                if (locStr) {
                    const parts = locStr.split(',').map(s => parseFloat(s.trim()));
                    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                        location = { lat: parts[0], lng: parts[1] };
                    } else {
                        showToast('Invalid location format. Use "lat, lng"', 'error');
                        return;
                    }
                } else {
                    showToast('Location is required for stations', 'error');
                    return;
                }

                // Upload station photo if selected
                const picInput = document.getElementById('stationPicFile');
                if (picInput && picInput.files && picInput.files[0]) {
                    try {
                        const file = picInput.files[0];
                        const ref = storage.ref(`stationPics/${Date.now()}_${file.name}`);
                        const snap = await ref.put(file);
                        const url = await snap.ref.getDownloadURL();
                        stationPics = [url];
                    } catch (e) {
                        showToast('Photo upload failed: ' + e.message, 'error');
                        return;
                    }
                }

                const amenitiesStr = document.getElementById('csAmenities').value.trim();
                if (amenitiesStr) {
                    amenities = amenitiesStr.split(',').map(a => a.trim()).filter(a => a);
                }
                const fuelStr = document.getElementById('csFuelTypes').value.trim();
                if (fuelStr) {
                    fuelTypes = fuelStr.split(',').map(a => a.trim()).filter(a => a);
                }
                operatingHours = document.getElementById('csHours').value.trim() || '';
            } else {
                const pwd = document.getElementById('csPassword').value.trim();
                const confirm = document.getElementById('csConfirm').value.trim();
                if (!pwd || pwd.length < 6) {
                    showToast('Password must be at least 6 characters', 'error');
                    return;
                }
                if (pwd !== confirm) {
                    showToast('Passwords do not match', 'error');
                    return;
                }
                password = pwd;
            }

            try {
                let uid = null;

                if (stationViewMode === 'companies') {
                    try {
                        const cred = await auth.createUserWithEmailAndPassword(email, password);
                        uid = cred.user.uid;
                    } catch (e) {
                        showToast('Error creating user: ' + e.message, 'error');
                        return;
                    }

                    const uploads = [];
                    const files = [
                        { id: 'logo', ref: 'logos/' + uid },
                        { id: 'cert', ref: 'certs/' + uid },
                        { id: 'zra', ref: 'zras/' + uid }
                    ];
                    for (const f of files) {
                        const input = document.getElementById(`${f.id}File`);
                        if (input && input.files && input.files[0]) {
                            const file = input.files[0];
                            const snap = await storage.ref(f.ref).put(file);
                            const url = await snap.ref.getDownloadURL();
                            if (f.id === 'logo') logoUrl = url;
                            else if (f.id === 'cert') certUrl = url;
                            else if (f.id === 'zra') zraUrl = url;
                        }
                    }
                } else {
                    uid = db.ref('stationOwners').push().key;
                }

                const data = {
                    stationName: name,
                    managerName: manager,
                    email: email,
                    phone: phone || '',
                    country: country,
                    location: location,
                    logo: logoUrl || '',
                    registration: certUrl || '',
                    zraDocs: zraUrl || '',
                    stationPics: stationPics || [],
                    amenities: amenities || [],
                    fuelTypes: fuelTypes || [],
                    operatingHours: operatingHours || '',
                    createdAt: new Date().toISOString(),
                    lastUpdated: new Date().toISOString()
                };

                if (stationViewMode === 'stations') {
                    await db.ref(`stationOwners/${uid}`).set(data);
                } else {
                    await db.ref(`stationOwners/${uid}`).update(data);
                }

                showToast(`${stationViewMode === 'stations' ? 'Station' : 'Company'} added successfully`, 'success');
                closeModal('detailModal');
                refreshAll();
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        }

            const stationPayments = allPayments.filter(p => p.stationId === id);
            const approved = stationPayments.filter(p => p.status === 'approved');
            const total = approved.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);

            const modal = document.getElementById('detailModal');
            document.getElementById('modalTitle').textContent = `💳 ${station.stationName} Payments`;
            let content = `
                <div class="revenue-card" style="margin-bottom:16px;">
                    <div class="revenue-number">${total.toFixed(2)} USD</div>
                    <div>Total Approved</div>
                </div>
                <div style="max-height:400px;overflow-y:auto;">
            `;
            if (!stationPayments.length) {
                content += `<div class="empty-state" style="padding:20px;"><i class="fas fa-credit-card"></i><p>No payments</p></div>`;
            } else {
                stationPayments.forEach(p => {
                    content += `
                        <div class="payment-row">
                            <div class="flex-between">
                                <div><strong>${p.status.toUpperCase()}</strong></div>
                                <div>${p.amount} ${p.currency || 'USD'}</div>

            content += `</div>`;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modalFooter').style.display = 'none';
            openModal('detailModal');
        }
