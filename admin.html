        function setupChatListeners() {
            cleanupChatListeners();
            if (!currentChat) return;
            const currentChatIdAtSetup = currentChat.id;

            const messagesListener = messagesRef.child(currentChat.id)
                .orderByChild('timestamp')
                .limitToLast(100)
                .on('child_added', (snapshot) => {
                    if (currentChat && currentChat.id === currentChatIdAtSetup) {
                        const message = snapshot.val();
                        message.id = snapshot.key;
                        const existingMessage = document.querySelector(
                            `.message-container[data-message-id="${message.id}"]`);
                        if (!existingMessage) {
                            addMessageToChat(message);
                        }
                        if (message.senderUid !== currentUser?.uid && !message.delivered) {
                            snapshot.ref.update({ delivered: true, status: 'delivered' });
                        }
                    }
                });
            chatListeners.push({ ref: messagesRef.child(currentChat.id), listener: messagesListener });

            const typingListener = db.ref(`typing/${currentChat.id}/${currentChat.uid}`)
                .on('value', (snapshot) => {
                    if (currentChat && currentChat.id === currentChatIdAtSetup) {
                        const typing = snapshot.val();
                        const typingIndicator = document.getElementById('typingIndicator');
                        if (typing && typing.isTyping) {
                            typingIndicator.classList.add('active');
                        } else {
                            typingIndicator.classList.remove('active');
                        }
                    }
                });
            chatListeners.push({ ref: db.ref(`typing/${currentChat.id}/${currentChat.uid}`), listener: typingListener });

            const onlineListener = onlineRef.child(currentChat.uid)
                .on('value', (snapshot) => {
                    if (currentChat && currentChat.id === currentChatIdAtSetup) {
                        const status = snapshot.val();
                        if (status) {
                            currentChat.isOnline = status.isOnline;
                            currentChat.lastSeen = status.lastSeen;
                            const statusDot = document.getElementById('chatStatusDot');
                            const statusText = document.getElementById('chatStatusText');
                            if (status.isOnline) {
                                statusDot.classList.add('online');
                                statusText.textContent = 'Online';
                            } else {
                                statusDot.classList.remove('online');
                                statusText.textContent = formatLastSeen(status.lastSeen);
                            }
                        }
                    }
                });
            chatListeners.push({ ref: onlineRef.child(currentChat.uid), listener: onlineListener });

            // Listen for incoming calls
            firestore.collection('calls')
                .where('receiverUid', '==', currentUser?.uid || '')
                .where('status', '==', 'ringing')
                .onSnapshot(snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const callData = change.doc.data();
                            if (currentCallId) return;
                            currentCallId = change.doc.id;
                            showIncomingCallUI(callData);
                        }
                    });
                });
        }

        function cleanupChatListeners() {
            chatListeners.forEach(({ ref, listener }) => {
                try {
                    ref.off('child_added', listener);
                    ref.off('value', listener);
                } catch (error) {}
            });
            chatListeners = [];
            if (typingTimeout) { clearTimeout(typingTimeout);
                typingTimeout = null; }
            isTyping = false;
        }

        function showIncomingCallUI(callData) {
            const modal = document.getElementById('incomingCallModal');
            document.getElementById('callerName').textContent = callData.callerName || 'Caller';
            document.getElementById('callerId').textContent = callData.callerId || 'Unknown';
            document.getElementById('incomingCallType').innerHTML =
                `<i class="fas fa-${callData.isVideo ? 'video' : 'phone'}"></i> Incoming ${callData.isVideo ? 'Video' : 'Voice'} Call`;
            ringingSound = new Audio('notification.mp3');
            ringingSound.loop = true;
            ringingSound.play().catch(e => console.log('Ring sound error:', e));
            openModal('incomingCallModal');
            setTimeout(() => {
                if (modal.classList.contains('active')) {
                    missCall();
                }
            }, 45000);
        }

        async function missCall() {
            if (ringingSound) { ringingSound.pause();
                ringingSound = null; }
            closeModal('incomingCallModal');
            if (currentCallId) {
                await firestore.collection('calls').doc(currentCallId).update({
                    status: 'missed',
                    wasConnected: false,
                    endedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            cleanupCall();
            showToast('Call missed', 'info');
        }

        async function loadMessages() {
            if (!currentChat) return;
            try {
                const snapshot = await messagesRef.child(currentChat.id)
                    .orderByChild('timestamp')
                    .limitToLast(50)
                    .once('value');
                const chatMessages = document.getElementById('chatMessages');
                chatMessages.innerHTML = '';
                if (!snapshot.exists()) {
                    chatMessages.innerHTML =
                        `
                    <div class="chat-messages-empty">
                      <i class="fas fa-comments chat-messages-empty-icon"></i>
                      <div class="chat-messages-empty-text">No messages yet</div>
                      <div class="chat-messages-empty-subtext">Start the conversation</div>
                    </div>`;
                    return;
                }
                const messages = [];
                const messageIds = new Set();
                snapshot.forEach(childSnapshot => {
                    const message = childSnapshot.val();
                    message.id = childSnapshot.key;
                    if (!messageIds.has(message.id)) {
                        messageIds.add(message.id);
                        if (message.type === 'view-once' && message.viewedBy && message.viewedBy
                            .includes(currentUser?.uid)) {
                            return;
                        }
                        messages.push(message);
                    }
                });
                const groupedMessages = groupMessagesByDate(messages);
                for (const date in groupedMessages) {
                    chatMessages.innerHTML += `
                    <div class="message-date-divider">
                      <span class="date-divider-text">${formatDate(date)}</span>
                    </div>`;
                    groupedMessages[date].forEach(message => {
                        const messageElement = createMessageElement(message);
                        chatMessages.appendChild(messageElement);
                    });
                }
                setTimeout(() => { scrollToBottom(); }, 50);
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        function groupMessagesByDate(messages) {
            const grouped = {};
            messages.forEach(message => {
                const date = new Date(message.timestamp).toDateString();
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(message);
            });
            return grouped;
        }

        function addMessageToChat(message) {
            const chatMessages = document.getElementById('chatMessages');
            const existingMessage = document.querySelector(`.message-container[data-message-id="${message.id}"]`);
            if (existingMessage) return;
            const emptyState = chatMessages.querySelector('.chat-messages-empty');
            if (emptyState) emptyState.remove();
            const messageDate = new Date(message.timestamp).toDateString();
            const lastDateDivider = chatMessages.querySelector('.message-date-divider:last-child');
            if (!lastDateDivider || lastDateDivider.querySelector('.date-divider-text').textContent !== formatDate(
                    messageDate)) {
                const dateDivider = document.createElement('div');
                dateDivider.className = 'message-date-divider';
                dateDivider.innerHTML = `<span class="date-divider-text">${formatDate(messageDate)}</span>`;
                chatMessages.appendChild(dateDivider);
            }
            const messageElement = createMessageElement(message);
            chatMessages.appendChild(messageElement);
            setTimeout(() => { chatMessages.scrollTop = chatMessages.scrollHeight; }, 100);
            if (message.senderId !== currentUser?.userId) {
                playNotificationSound();
            }
        }

        function createMessageElement(message) {
            const isSent = message.senderId === currentUser?.userId;
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-container ${isSent ? 'sent' : 'received'}`;
            messageDiv.dataset.messageId = message.id;

            let bubbleContent = '';
            switch (message.type) {
                case 'text':
                    bubbleContent = createTextMessage(message, isSent);
                    break;
                case 'image':
                    bubbleContent = createImageMessage(message, isSent);
                    break;
                case 'video':
                    bubbleContent = createVideoMessage(message, isSent);
                    break;
                case 'document':
                    bubbleContent = createDocumentMessage(message, isSent);
                    break;
                case 'location':
                    bubbleContent = createLocationMessage(message, isSent);
                    break;
                case 'voice':
                    bubbleContent = createVoiceMessage(message, isSent);
                    break;
                case 'view-once':
                    bubbleContent = createViewOnceMessage(message, isSent);
                    break;
                case 'call':
                    bubbleContent = createCallMessage(message, isSent);
                    break;
                default:
                    bubbleContent = createTextMessage(message, isSent);
            }
            messageDiv.innerHTML = bubbleContent;

            // Swipe to reply
            let touchStartX = 0;
            messageDiv.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            messageDiv.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].screenX;
                const distance = touchEndX - touchStartX;
                if (distance > 50) {
                    const msgId = message.id;
                    const senderName = message.senderName;
                    const textPreview = getMessagePreview(message.type, message.text);
                    const type = message.type;
                    setReplyMessage(msgId, senderName, textPreview, type);
                }
            }, { passive: true });

            // Context menu for reactions
            if (message.type !== 'view-once') {
                const bubble = messageDiv.querySelector('.message-bubble');
                bubble.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    showMessageOptions(e, message.id, isSent);
                });
                let pressTimer;
                bubble.addEventListener('touchstart', (e) => {
                    pressTimer = setTimeout(() => {
                        showMessageOptions(e, message.id, isSent);
                    }, 500);
                });
                bubble.addEventListener('touchend', () => { clearTimeout(pressTimer); });
                bubble.addEventListener('touchmove', () => { clearTimeout(pressTimer); });
            }

            // Load reactions
            loadMessageReactions(message.id).then(reactions => {
                if (Object.keys(reactions).length > 0) {
                    addReactionsToMessage(messageDiv, message.id, reactions);
                }
            });
            return messageDiv;
        }

        function getReplyHtml(replyTo) {
            let icon = 'fas fa-reply';
            let typeText = 'message';
            let displayText = replyTo.text || '';
            if (replyTo.type) {
                switch (replyTo.type) {
                    case 'image':
                        icon = 'fas fa-image';
                        typeText = 'photo';
                        break;
                    case 'video':
                        icon = 'fas fa-video';
                        typeText = 'video';
                        break;
                    case 'document':
                        icon = 'fas fa-file';
                        typeText = 'document';
                        break;
                    case 'voice':
                        icon = 'fas fa-microphone';
                        typeText = 'voice message';
                        break;
                    case 'location':
                        icon = 'fas fa-map-marker-alt';
                        typeText = 'location';
                        break;
                    case 'view-once':
                        icon = 'fas fa-eye';
                        typeText = 'view-once photo';
                        break;
                }
            }
            return `
              <div class="message-reply">
                <div class="message-reply-header">
                  <i class="${icon}"></i> Reply to ${escapeHtml(replyTo.senderName)}'s ${typeText}
                </div>
                <div class="message-reply-text">${escapeHtml(displayText)}</div>
              </div>`;
        }

        function createTextMessage(message, isSent) {
            let replyHtml = '';
            if (message.replyTo) replyHtml = getReplyHtml(message.replyTo);
            return `
              <div class="message-bubble">
                ${replyHtml}
                <div class="message-text">${escapeHtml(message.text)}</div>
                <span class="message-time">
                  ${formatTime(message.timestamp)}
                  ${isSent ? `
                    <span class="message-status">
                      ${message.read ? '<i class="fas fa-check-double status-read"></i>' :
                        message.delivered ? '<i class="fas fa-check-double status-delivered"></i>' :
                        '<i class="fas fa-check status-sent"></i>'}
                    </span>` : ''}
                </span>
              </div>`;
        }

        function createImageMessage(message, isSent) {
            let replyHtml = '';
            if (message.replyTo) replyHtml = getReplyHtml(message.replyTo);
            return `
              <div class="message-bubble">
                ${replyHtml}
                <img src="${message.mediaUrl}" alt="Photo" class="message-media" onclick="viewMedia('${message.mediaUrl}')">
                ${message.text ? `<div class="message-text">${escapeHtml(message.text)}</div>` : ''}
                <span class="message-time">
                  ${formatTime(message.timestamp)}
                  ${isSent ? `
                    <span class="message-status">
                      ${message.read ? '<i class="fas fa-check-double status-read"></i>' :
                        message.delivered ? '<i class="fas fa-check-double status-delivered"></i>' :
                        '<i class="fas fa-check status-sent"></i>'}
                    </span>` : ''}
                </span>
              </div>`;
        }

        function createVideoMessage(message, isSent) {
            let replyHtml = '';
            if (message.replyTo) replyHtml = getReplyHtml(message.replyTo);
            return `
              <div class="message-bubble">
                ${replyHtml}
                <video src="${message.mediaUrl}" controls class="message-media"></video>
                ${message.text ? `<div class="message-text">${escapeHtml(message.text)}</div>` : ''}
                <span class="message-time">
                  ${formatTime(message.timestamp)}
                  ${isSent ? `
                    <span class="message-status">
                      ${message.read ? '<i class="fas fa-check-double status-read"></i>' :
                        message.delivered ? '<i class="fas fa-check-double status-delivered"></i>' :
                        '<i class="fas fa-check status-sent"></i>'}
                    </span>` : ''}
                </span>
              </div>`;
        }

        function createDocumentMessage(message, isSent) {
            let replyHtml = '';
            if (message.replyTo) replyHtml = getReplyHtml(message.replyTo);
            return `
              <div class="message-bubble">
                ${replyHtml}
                <div class="message-document" onclick="downloadFile('${message.mediaUrl}','${message.fileName}')">
                  <div class="message-document-icon"><i class="fas fa-file"></i></div>
                  <div class="message-document-info">
                    <div class="message-document-name">${escapeHtml(message.fileName)}</div>
                    <div class="message-document-size">${formatFileSize(message.fileSize)}</div>
                  </div>
                </div>
                ${message.text ? `<div class="message-text">${escapeHtml(message.text)}</div>` : ''}
                <span class="message-time">
                  ${formatTime(message.timestamp)}
                  ${isSent ? `
                    <span class="message-status">
                      ${message.read ? '<i class="fas fa-check-double status-read"></i>' :
                        message.delivered ? '<i class="fas fa-check-double status-delivered"></i>' :
                        '<i class="fas fa-check status-sent"></i>'}
                    </span>` : ''}
                </span>
              </div>`;
        }

        function createLocationMessage(message, isSent) {
            let replyHtml = '';
            if (message.replyTo) replyHtml = getReplyHtml(message.replyTo);
            const mapId = `map-${message.id}`;
            setTimeout(() => {
                if (document.getElementById(mapId)) {
                    const map = L.map(mapId).setView([message.location.latitude, message.location.longitude], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' })
                        .addTo(map);
                    L.marker([message.location.latitude, message.location.longitude])
                        .addTo(map)
                        .bindPopup(message.location.address || 'Location')
                        .openPopup();
                }
            }, 100);
            return `
              <div class="message-bubble">
                ${replyHtml}
                <div class="message-location" onclick="openLocationInMap('${message.location.latitude}','${message.location.longitude}','${message.location.address}')">
                  <div id="${mapId}" class="message-location-map" style="width:100%;height:150px;border-radius:var(--radius-sm);"></div>
                </div>
                <div class="message-location-info">
                  <div class="message-location-address"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(message.location.address||'Shared Location')}</div>
                  <div class="message-location-details"><span>Lat: ${message.location.latitude.toFixed(4)}</span> • <span>Lng: ${message.location.longitude.toFixed(4)}</span></div>
                </div>
                <span class="message-time">
                  ${formatTime(message.timestamp)}
                  ${isSent ? `
                    <span class="message-status">
                      ${message.read ? '<i class="fas fa-check-double status-read"></i>' :
                        message.delivered ? '<i class="fas fa-check-double status-delivered"></i>' :
                        '<i class="fas fa-check status-sent"></i>'}
                    </span>` : ''}
                </span>
              </div>`;
        }

        function createVoiceMessage(message, isSent) {
            let replyHtml = '';
            if (message.replyTo) replyHtml = getReplyHtml(message.replyTo);
            const voiceId = `voice-${message.id}`;
            return `
              <div class="message-bubble">
                ${replyHtml}
                <div class="message-voice">
                  <button class="message-voice-play" onclick="playVoiceMessage('${voiceId}','${message.mediaUrl}')" id="${voiceId}-play">
                    <i class="fas fa-play"></i>
                  </button>
                  <div class="message-voice-waveform" id="${voiceId}-waveform">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                  </div>
                  <span class="message-voice-duration">${message.duration||'0:00'}</span>
                </div>
                <span class="message-time">
                  ${formatTime(message.timestamp)}
                  ${isSent ? `
                    <span class="message-status">
                      ${message.read ? '<i class="fas fa-check-double status-read"></i>' :
                        message.delivered ? '<i class="fas fa-check-double status-delivered"></i>' :
                        '<i class="fas fa-check status-sent"></i>'}
                    </span>` : ''}
                </span>
              </div>`;
        }

        function createViewOnceMessage(message, isSent) {
            const hasViewed = message.viewedBy && message.viewedBy.includes(currentUser?.uid);
            let replyHtml = '';
            if (message.replyTo) replyHtml = getReplyHtml(message.replyTo);
            if (hasViewed) {
                return `
                <div class="message-bubble">
                  ${replyHtml}
                  <div style="text-align:center;padding:20px;color:var(--gray-500);">
                    <i class="fas fa-eye-slash" style="font-size:24px;margin-bottom:8px;"></i>
                    <div>View once media has been viewed</div>
                  </div>
                  <span class="message-time">
                    ${formatTime(message.timestamp)}
                    ${isSent ? `
                      <span class="message-status">
                        ${message.read ? '<i class="fas fa-check-double status-read"></i>' :
                          message.delivered ? '<i class="fas fa-check-double status-delivered"></i>' :
                          '<i class="fas fa-check status-sent"></i>'}
                      </span>` : ''}
                  </span>
                </div>`;
            }
            return `
              <div class="message-bubble message-view-once">
                ${replyHtml}
                <div class="message-view-once-overlay" id="viewOnceOverlay-${message.id}" onclick="viewOnceMessage('${message.id}')">
                  <i class="fas fa-eye"></i>
                  <span>View Once</span>
                  <small>Tap to view • This media will disappear after viewing</small>
                </div>
                <span class="message-time">
                  ${formatTime(message.timestamp)}
                  ${isSent ? `
                    <span class="message-status">
                      ${message.read ? '<i class="fas fa-check-double status-read"></i>' :
                        message.delivered ? '<i class="fas fa-check-double status-delivered"></i>' :
                        '<i class="fas fa-check status-sent"></i>'}
                    </span>` : ''}
                </span>
              </div>`;
        }

        function createCallMessage(message, isSent) {
            let icon = 'fas fa-phone-alt';
            let color = '#34c759';
            if (message.text.includes('missed')) { icon = 'fas fa-phone-slash';
                color = '#ff3b30'; } else if (message.text.includes('rejected')) { icon = 'fas fa-ban';
                color = '#ff9500'; }
            return `
              <div class="message-bubble" style="background:${isSent?'linear-gradient(135deg, #ff3b30, #ff2d55)':'#ffe5e7'};color:${isSent?'white':'#000'};">
                <div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
                  <i class="${icon}" style="color:${color};font-size:18px;"></i>
                  <span>${escapeHtml(message.text)}</span>
                </div>
                <span class="message-time" style="${isSent?'color:rgba(255,255,255,0.8)':'color:var(--gray-600)'};">
                  ${formatTime(message.timestamp)}
                </span>
              </div>`;
        }

        function addReactionsToMessage(messageDiv, messageId, reactions) {
            const bubble = messageDiv.querySelector('.message-bubble');
            const reactionSummary = {};
            Object.values(reactions).forEach(reaction => {
                if (reaction.added) {
                    if (!reactionSummary[reaction.emoji]) {
                        reactionSummary[reaction.emoji] = { count: 0, users: [] };
                    }
                    reactionSummary[reaction.emoji].count++;
                    reactionSummary[reaction.emoji].users.push(reaction.userId);
                }
            });
            if (Object.keys(reactionSummary).length === 0) return;
            const reactionsDiv = document.createElement('div');
            reactionsDiv.className = 'message-reactions';
            reactionsDiv.innerHTML = Object.keys(reactionSummary).map(emoji => {
                const userReacted = reactionSummary[emoji].users.includes(currentUser?.uid);
                return `
                <div class="message-reaction ${userReacted?'user-reacted':''}" onclick="toggleReaction('${messageId}','${emoji}')">
                  <span>${emoji}</span>
                  <span class="message-reaction-count">${reactionSummary[emoji].count}</span>
                </div>`;
            }).join('');
            bubble.appendChild(reactionsDiv);
        }

        async function loadMessageReactions(messageId) {
            try {
                const snapshot = await db.ref(`messageReactions/${currentChat.id}/${messageId}`).once('value');
                return snapshot.val() || {};
            } catch (error) { return {}; }
        }

        async function toggleReaction(messageId, emoji) {
            try {
                const reactionRef = db.ref(`messageReactions/${currentChat.id}/${messageId}/${currentUser.uid}_${emoji}`);
                const snapshot = await reactionRef.once('value');
                if (snapshot.exists()) {
                    const reaction = snapshot.val();
                    await reactionRef.update({ added: !reaction.added, timestamp: new Date().toISOString() });
                } else {
                    await reactionRef.set({ messageId, emoji, userId: currentUser.uid, userName: currentUser.name,
                        added: true, timestamp: new Date().toISOString() });
                }
            } catch (error) { console.error('Error toggling reaction:', error); }
        }

        function showMessageOptions(e, messageId, isSent) {
            const messageContainer = e.target.closest('.message-container');
            if (!messageContainer) return;
            const bubble = messageContainer.querySelector('.message-bubble');
            const rect = bubble.getBoundingClientRect();

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'reaction-picker show';
            optionsDiv.style.position = 'absolute';
            optionsDiv.style.left = rect.left + 'px';
            optionsDiv.style.top = (rect.bottom + window.scrollY + 5) + 'px';
            optionsDiv.style.zIndex = '2000';
            const emojis = ['👍', '❤️', '😂', '😮', '😢', '🙏'];
            optionsDiv.innerHTML = emojis.map(emoji =>
                    `<div class="reaction-emoji" data-message-id="${messageId}" data-emoji="${emoji}">${emoji}</div>`
                    ).join('');
            optionsDiv.addEventListener('click', (event) => {
                const target = event.target.closest('.reaction-emoji');
                if (!target) return;
                toggleReaction(target.dataset.messageId, target.dataset.emoji);
                optionsDiv.remove();
                if (messageOptions) messageOptions.remove();
            });
            document.getElementById('chatPage').appendChild(optionsDiv);

            const messageOptions = document.createElement('div');
            messageOptions.className = 'dropdown-menu show';
            messageOptions.style.position = 'absolute';
            messageOptions.style.left = rect.left + 'px';
            messageOptions.style.top = (rect.bottom + window.scrollY + 50) + 'px';
            messageOptions.innerHTML = `
                <button class="dropdown-item" onclick="copyMessageText('${messageId}')"><i class="fas fa-copy"></i> Copy</button>
                <button class="dropdown-item" onclick="forwardMessage('${messageId}')"><i class="fas fa-share"></i> Forward</button>
                ${isSent ? `<button class="dropdown-item" onclick="deleteMessage('${messageId}')"><i class="fas fa-trash"></i> Delete</button>` : ''}
                <button class="dropdown-item" onclick="reportMessage('${messageId}')"><i class="fas fa-flag"></i> Report</button>`;
            document.getElementById('chatPage').appendChild(messageOptions);

            setTimeout(() => {
                document.addEventListener('click', function closeOptions(ev) {
                    if (!optionsDiv.contains(ev.target) && !messageOptions.contains(ev.target)) {
                        optionsDiv.remove();
                        messageOptions.remove();
                        document.removeEventListener('click', closeOptions);
                    }
                });
            }, 10);
        }

        async function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const chatSendBtn = document.getElementById('chatSendBtn');
            const text = chatInput.value.trim();
            if (!text || chatSendBtn.disabled) return;
            try {
                chatSendBtn.disabled = true;
                const messageId = messagesRef.child(currentChat.id).push().key;
                const messageData = {
                    id: messageId,
                    text: text,
                    senderId: currentUser.userId,
                    senderName: currentUser.name,
                    senderUid: currentUser.uid,
                    senderAvatar: currentUser.profilePicture,
                    type: 'text',
                    timestamp: new Date().toISOString(),
                    status: 'sent',
                    delivered: false,
                    read: false
                };
                if (replyMessage) {
                    messageData.replyTo = {
                        messageId: replyMessage.id,
                        senderName: replyMessage.senderName,
                        text: replyMessage.text,
                        type: replyMessage.type
                    };
                }
                await messagesRef.child(currentChat.id).child(messageId).set(messageData);
                await updateChatLastMessage(text, 'text');
                chatInput.value = '';
                chatInput.style.height = 'auto';
                chatSendBtn.disabled = false;
                cancelReply();
                sendTypingIndicator(false);
                isTyping = false;
                playSentSound();
            } catch (error) {
                console.error('Error sending message:', error);
                showToast('Failed to send message', 'error');
                chatSendBtn.disabled = false;
            }
        }

        async function updateChatLastMessage(message, type) {
            try {
                const chatData = { lastMessage: message, lastMessageType: type, lastMessageTime: new Date().toISOString(),
                    unreadCount: 0 };
                await db.ref(`users/${currentUser.uid}/chats/${currentChat.id}`).update(chatData);
                if (currentChat.type === 'private') {
                    await db.ref(`users/${currentChat.uid}/chats/${currentChat.id}`).update({
                        lastMessage: message,
                        lastMessageType: type,
                        lastMessageTime: new Date().toISOString(),
                        unreadCount: firebase.database.ServerValue.increment(1)
                    });
                }
            } catch (error) { console.error('Error updating chat:', error); }
        }

        async function sendTypingIndicator(isTyping) {
            if (currentChat.type !== 'private') return;
            try {
                await db.ref(`typing/${currentChat.id}/${currentUser.uid}`).set({
                    isTyping: isTyping,
                    timestamp: new Date().toISOString()
                });
            } catch (error) { console.error('Error sending typing indicator:', error); }
        }

        function scrollToBottom() {
            const chatMessages = document.getElementById('chatMessages');
            if (chatMessages) chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function setReplyMessage(messageId, senderName, textPreview, type) {
            replyMessage = { id: messageId, senderName: senderName, text: textPreview, type: type };
            showReplyPreview();

        function showReplyPreview() {

        // ================================================================
        // VOICE RECORDING
        // ================================================================
        function startVoiceRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showToast('Voice recording not supported', 'error');
                return;
            }
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = event => { audioChunks.push(event.data); };
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const formData = new FormData();
                        formData.append('file', audioBlob);
                        formData.append('upload_preset', CLOUDINARY_CONFIG.uploadPreset);
                        formData.append('folder', 'zynapse/voice');
                        showToast('Uploading...', 'info');
                        try {
                            const response = await fetch(
                                `https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/upload`, { method: 'POST',
                                    body: formData });
                            const result = await response.json();
                            const audioUrl = result.secure_url;
                            const duration = Math.floor(audioBlob.size / 16000);
                            await sendVoiceMessage(audioUrl, duration);
                        } catch (uploadError) {
                            console.error('Error uploading voice note:', uploadError);
                            showToast('Upload failed', 'error');
                        }
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    recordingStartTime = Date.now();
                    document.getElementById('voiceRecordingUI').classList.add('active');
                    updateRecordingTime();
                    recordingTimer = setInterval(updateRecordingTime, 1000);
                    const recordingUI = document.getElementById('voiceRecordingUI');
                    recordingUI.addEventListener('touchend', (e) => { e.preventDefault(); if (isRecording)
                            stopVoiceRecording(); }, { passive: true });
                    recordingUI.addEventListener('mouseup', () => { if (isRecording) stopVoiceRecording(); });
                })
                .catch(error => {
                    console.error('Error accessing microphone:', error);
                    showToast('Microphone access denied', 'error');
                });
        }

        function stopVoiceRecording(cancel) {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('voiceRecordingUI').classList.remove('active');
                if (recordingTimer) { clearInterval(recordingTimer);
                    recordingTimer = null; }
                if (cancel) showToast('Recording cancelled', 'info');
            }
        }

        function updateRecordingTime() {
            if (!recordingStartTime) return;
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('recordingTime').textContent =
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // ================================================================

        // ================================================================
        async function initiateCall(isVideo) {
            if (!currentChat || currentChat.type !== 'private') {
                showToast('You can only call companies', 'error');
                return;
            }
            currentCallType = isVideo ? 'video' : 'audio';
            try {
                const constraints = { audio: true, video: isVideo };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('localVideo').srcObject = localStream;

                const callId = firestore.collection('calls').doc().id;
                currentCallId = callId;

                await firestore.collection('calls').doc(callId).set({
                    callerUid: currentUser.uid,
                    callerId: currentUser.userId,
                    callerName: currentUser.name,
                    callerAvatar: currentUser.profilePicture || '',
                    receiverUid: currentChat.uid,
                    receiverId: currentChat.userId,
                    receiverName: currentChat.userName,
                    receiverAvatar: currentChat.userAvatar || '',
                    isVideo: isVideo,
                    chatId: currentChat.id,
                    callType: isVideo ? 'video' : 'audio',
                    wasConnected: false,
                    status: 'ringing',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                peerConnection = new RTCPeerConnection(iceServers);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.ontrack = event => {
                    remoteStream = event.streams[0];
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                };
                peerConnection.onicecandidate = event => {
                    if (event.candidate) {
                        firestore.collection('calls').doc(callId)
                            .collection('callerCandidates').add(event.candidate.toJSON());
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                await firestore.collection('calls').doc(callId).update({
                    offer: { type: offer.type, sdp: offer.sdp }
                });

                window[`callLogSent_${callId}`] = false;

                callDocListener = firestore.collection('calls').doc(callId)
                    .onSnapshot(async (snapshot) => {
                        const data = snapshot.data();
                        if (!data) return;
                        if (data.answer && !peerConnection.currentRemoteDescription) {
                            const answer = new RTCSessionDescription(data.answer);
                            await peerConnection.setRemoteDescription(answer);
                        }
                        const finalStates = ['ended', 'rejected', 'missed'];
                        if (finalStates.includes(data.status) && data.chatId && !window[
                                `callLogSent_${callId}`]) {
                            let outcome = 'missed';
                            if (data.status === 'ended' && data.wasConnected) outcome = 'answered';
                            else if (data.status === 'rejected') outcome = 'rejected';
                            else if (data.status === 'missed') outcome = 'missed';
                            await sendCallLogMessage(data.chatId, data.callType || (data.isVideo ? 'video' :
                                'audio'), outcome);
                            window[`callLogSent_${callId}`] = true;
                        }
                        if (data.status === 'ended' || data.status === 'rejected' || data.status === 'missed') {
                            endCall(true);
                        }
                    });

                receiverCandidateListener = firestore.collection('calls').doc(callId)
                    .collection('receiverCandidates')
                    .onSnapshot(snapshot => {
                        snapshot.docChanges().forEach(async change => {
                            if (change.type === 'added') {
                                const candidate = new RTCIceCandidate(change.doc.data());
                                await peerConnection.addIceCandidate(candidate);
                            }
                        });
                    });

                const modal = document.getElementById('activeCallModal');
                modal.classList.remove('video-mode', 'audio-mode');
                modal.classList.add(isVideo ? 'video-mode' : 'audio-mode');
                if (!isVideo) {
                    document.getElementById('callRemoteAvatar').src = currentChat.userAvatar ||
                        'https://via.placeholder.com/120';
                    document.getElementById('callRemoteName').textContent = currentChat.userName;
                    document.getElementById('callRemoteId').textContent = currentChat.userId;
                    document.getElementById('callLocalAvatar').src = currentUser.profilePicture ||
                        'https://via.placeholder.com/80';
                    document.getElementById('callLocalName').textContent = currentUser.name;
                }
                document.getElementById('activeCallUserName').textContent = currentChat.userName;
                openModal('activeCallModal');
                startCallTimer();
            } catch (error) {
                console.error('Error initiating call:', error);
                showToast('Could not start call', 'error');
                cleanupCall();
            }
        }

        async function acceptCall() {
            if (!currentCallId) return;
            const callRef = firestore.collection('calls').doc(currentCallId);
            const callDoc = await callRef.get();
            const callData = callDoc.data();
            try {
                if (ringingSound) { ringingSound.pause();
                    ringingSound = null; }
                const constraints = { audio: true, video: callData.isVideo };
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                document.getElementById('localVideo').srcObject = localStream;

                peerConnection = new RTCPeerConnection(iceServers);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.ontrack = event => {
                    remoteStream = event.streams[0];
                    document.getElementById('remoteVideo').srcObject = remoteStream;
                };
                peerConnection.onicecandidate = event => {
                    if (event.candidate) {
                        callRef.collection('receiverCandidates').add(event.candidate.toJSON());
                    }
                };

                const offer = new RTCSessionDescription(callData.offer);
                await peerConnection.setRemoteDescription(offer);
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await callRef.update({
                    answer: { type: answer.type, sdp: answer.sdp },
                    status: 'connected',
                    wasConnected: true,
                    answeredAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                callerCandidateListener = callRef.collection('callerCandidates')
                    .onSnapshot(snapshot => {
                        snapshot.docChanges().forEach(async change => {
                            if (change.type === 'added') {
                                const candidate = new RTCIceCandidate(change.doc.data());
                                await peerConnection.addIceCandidate(candidate);
                            }
                        });
                    });

                closeModal('incomingCallModal');
                document.getElementById('activeCallUserName').textContent = callData.callerName;
                openModal('activeCallModal');
                startCallTimer();
            } catch (error) {
                console.error('Error accepting call:', error);
                showToast('Failed to accept call', 'error');
                rejectCall();
            }
        }

        async function rejectCall() {
            if (ringingSound) { ringingSound.pause();
                ringingSound = null; }
            closeModal('incomingCallModal');
            if (currentCallId) {
                await firestore.collection('calls').doc(currentCallId).update({
                    status: 'rejected',
                    wasConnected: false,
                    endedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            cleanupCall();
        }

        async function endCall(remote) {
            if (!remote && currentCallId) {
                const callRef = firestore.collection('calls').doc(currentCallId);
                const callDoc = await callRef.get();
                const callData = callDoc.data();
                let finalStatus = 'ended';
                if (callData.status === 'connected') finalStatus = 'ended';
                else if (callData.status === 'ringing') finalStatus = 'missed';
                await callRef.update({
                    status: finalStatus,
                    wasConnected: callData.wasConnected || false,
                    endedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            cleanupCall();
            closeModal('activeCallModal');
            closeModal('incomingCallModal');
        }

        function cleanupCall() {
            if (localStream) { localStream.getTracks().forEach(t => t.stop());
                localStream = null; }
            if (remoteStream) { remoteStream.getTracks().forEach(t => t.stop());
                remoteStream = null; }
            if (peerConnection) { peerConnection.close();
                peerConnection = null; }
            if (callDocListener) callDocListener();
            if (callerCandidateListener) callerCandidateListener();
            if (receiverCandidateListener) receiverCandidateListener();
            callDocListener = callerCandidateListener = receiverCandidateListener = null;
            if (callTimerInterval) { clearInterval(callTimerInterval);
                callTimerInterval = null; }
            currentCallId = null;
            if (ringingSound) { ringingSound.pause();
                ringingSound = null; }
            document.getElementById('localVideo').srcObject = null;
            document.getElementById('remoteVideo').srcObject = null;
        }

        }

        function toggleVideo() {
            const videoTrack = localStream?.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                const btn = document.getElementById('muteVideoBtn');
                btn.innerHTML = videoTrack.enabled ? '<i class="fas fa-video"></i>' :
                    '<i class="fas fa-video-slash"></i>';
            }
        }

        function toggleSpeaker() {
            showToast('Speaker toggled (depends on device)', 'info');
        }

        function startCallTimer() {
            callStartTime = Date.now();
            callTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                document.getElementById('callTimer').textContent =
                    `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }, 1000);
        }

        async function sendCallLogMessage(chatId, callType, outcome) {
            if (!chatId) return;
            const messageId = messagesRef.child(chatId).push().key;
            const text = `${callType === 'video' ? 'Video' : 'Audio'} call ${outcome}`;
            const messageData = {
                id: messageId,
                type: 'call',
                text: text,
                senderId: 'system',
                senderName: 'System',
                senderUid: 'system',
                senderAvatar: '',
                timestamp: new Date().toISOString(),
                status: 'sent'
            };
            await messagesRef.child(chatId).child(messageId).set(messageData);
            await db.ref(`users/${currentUser.uid}/chats/${chatId}`).update({
                lastMessage: text,
                lastMessageType: 'call',
                lastMessageTime: new Date().toISOString()
            });
            if (currentChat && currentChat.type === 'private' && currentChat.uid) {
                await db.ref(`users/${currentChat.uid}/chats/${chatId}`).update({
                    lastMessage: text,
                    lastMessageType: 'call',
                    lastMessageTime: new Date().toISOString(),
                    unreadCount: firebase.database.ServerValue.increment(1)
                });
            }
        }

        // ================================================================
        // CHAT OPTIONS & THEME
        // ================================================================
        function openChatOptions() { openModal('chatOptionsModal'); }

        function viewChatUserProfile() {
            if (currentChat && currentChat.uid) {
                showToast('Viewing profile for ' + currentChat.userName, 'info');
                closeModal('chatOptionsModal');
            }
        }

        function togglePinChat() {
            if (!currentChat) return;
            const isPinned = pinnedChats.some(p => p.chatId === currentChat.id);
            if (isPinned) {
                db.ref(`users/${currentUser.uid}/pinnedChats/${currentChat.id}`).remove();
                showToast('Unpinned chat', 'info');
            } else {
                db.ref(`users/${currentUser.uid}/pinnedChats/${currentChat.id}`).set({
                    chatId: currentChat.id,
                    pinnedAt: new Date().toISOString()
                });
                showToast('Pinned chat', 'success');
            }
            closeModal('chatOptionsModal');
        }

        function openChatSearch() {
            closeModal('chatOptionsModal');
            showToast('Search messages (implemented in full version)', 'info');
        }

        async function deleteChat() {
            if (!currentChat || !confirm('Delete this chat? All messages will be deleted.')) return;
            try {
                await db.ref(`users/${currentUser.uid}/chats/${currentChat.id}`).remove();
                await messagesRef.child(currentChat.id).remove();
                showToast('Chat deleted', 'success');
                closeChat();
                closeModal('chatOptionsModal');
            } catch (error) {
                console.error('Error deleting chat:', error);
                showToast('Failed to delete', 'error');
            }
        }

        function openChatThemeModal() {
            openModal('chatThemeModal');
            document.querySelectorAll('.theme-option').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.theme === 'normal') btn.classList.add('active');
            });
            document.getElementById('customThemeOptions').style.display = 'none';
        }

        function selectTheme(theme) {
            document.querySelectorAll('.theme-option').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.theme === theme) btn.classList.add('active');
            });
            document.getElementById('customThemeOptions').style.display = theme === 'custom' ? 'block' : 'none';
        }

        async function saveChatTheme() {
            const theme = document.querySelector('.theme-option.active')?.dataset.theme;
            if (!theme) { showToast('Please select a theme', 'error'); return; }
            const themeData = { theme };
            if (theme === 'custom') {
                themeData.sentBubbleColor = document.getElementById('sentBubbleColor').value;
                themeData.receivedBubbleColor = document.getElementById('receivedBubbleColor').value;
            }
            try {
                await db.ref(`users/${currentUser.uid}/chatThemes/${currentChat.id}`).set(themeData);
                showToast('Theme applied!', 'success');
                closeModal('chatThemeModal');
                applyChatTheme(currentChat.id, themeData);
            } catch (error) {
                console.error('Error saving theme:', error);
                showToast('Failed to save theme', 'error');
            }
        }

        function applyChatTheme(chatId, themeData) {
            const chatMessagesContainer = document.querySelector('.chat-messages-container');
            if (!chatMessagesContainer) return;
            chatMessagesContainer.classList.remove('theme-love', 'theme-custom');
            if (themeData.theme === 'love') {
                chatMessagesContainer.classList.add('theme-love');
            } else if (themeData.theme === 'custom') {
                chatMessagesContainer.classList.add('theme-custom');
                document.documentElement.style.setProperty('--chat-sent-bubble', themeData.sentBubbleColor);
                document.documentElement.style.setProperty('--chat-received-bubble', themeData.receivedBubbleColor);
            }
        }

        // ================================================================
        // MISCELLANEOUS HELPERS
        // ================================================================
        function viewMedia(url) { window.open(url, '_blank'); }

        function downloadFile(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function openLocationInMap(lat, lng, address) {
            window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
        }

        function playNotificationSound() {
            try {
                if (notificationSound) {
                    notificationSound.currentTime = 0;
                    notificationSound.play();
                }
            } catch (e) {}
        }

        function playSentSound() {
            try {
                if (sentSound) {
                    sentSound.currentTime = 0;
                    sentSound.play();
                }
            } catch (e) {}
        }

        function copyMessageText(messageId) {
            const messageElement = document.querySelector(`.message-container[data-message-id="${messageId}"]`);
            if (messageElement) {
                const text = messageElement.querySelector('.message-text')?.textContent;
                if (text) {
                    navigator.clipboard.writeText(text);
                    showToast('Message copied', 'success');
                }
            }
        }

        async function forwardMessage(messageId) {
            showToast('Forward (implemented in full version)', 'info');
        }

        async function deleteMessage(messageId) {
            if (!confirm('Delete this message?')) return;
            try {
                await messagesRef.child(currentChat.id).child(messageId).remove();
                const messageElement = document.querySelector(`.message-container[data-message-id="${messageId}"]`);
                if (messageElement) messageElement.remove();
                showToast('Message deleted', 'success');
            } catch (error) {
                console.error('Error deleting message:', error);
                showToast('Failed to delete', 'error');
            }
        }

        async function reportMessage(messageId) {
            showToast('Report (implemented in full version)', 'info');
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // ================================================================
        // LOGIN / AUTH
        // ================================================================
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("adminEmail").value.trim();
            const pwd = document.getElementById("adminPassword").value;
            if (email !== "admin@fuelradar.com") {
                document.getElementById("loginError").innerText = "Admin only.";
                return;
            }
            try {
                await auth.signInWithEmailAndPassword(email, pwd);
            } catch (err) {
                document.getElementById("loginError").innerText = err.message;
            }
        };

        document.getElementById("logoutMainBtn").onclick = () => auth.signOut();

        auth.onAuthStateChanged(async (user) => {
            if (user && user.email === "admin@fuelradar.com") {
                currentUser = {
                    uid: user.uid,
                    userId: 'ADMIN',
                    name: 'Admin',
                    email: user.email,
                    profilePicture: 'https://via.placeholder.com/150'
                };
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("dashboard").style.display = "flex";
                document.getElementById("bottomNav").style.display = "flex";
                await refreshAll();

                document.querySelectorAll(".nav-item[data-nav]").forEach(btn => {
                    btn.onclick = () => {
                        document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                        currentTab = btn.dataset.nav;
                        searchTerm = "";
                        selectedCountry = "all";
                        document.getElementById("searchInput").value = "";
                        document.getElementById("countryFilter").value = "all";
                        renderCurrentTab();
                        updateCountryFilter();
                    };
                });

                document.getElementById("searchInput").oninput = (e) => {
                    searchTerm = e.target.value.toLowerCase();
                    renderCurrentTab();
                };
                document.getElementById("countryFilter").onchange = (e) => {
                    selectedCountry = e.target.value;
                    renderCurrentTab();
                };
                document.getElementById("refreshBtn").onclick = async () => {
                    await refreshAll();
                    showToast("Refreshed", 'info');
                };

                document.querySelector(".nav-item[data-nav='users']").classList.add("active");
            } else {
                if (user) await auth.signOut();
                document.getElementById("loginScreen").style.display = "flex";
                document.getElementById("dashboard").style.display = "none";
                document.getElementById("bottomNav").style.display = "none";
            }
        });

        // ================================================================
        // PWA INSTALL
        // ================================================================
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installAppBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBanner.style.display = 'none';
                deferredPrompt = null;
            }
        });
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installBanner.style.display = 'none';
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Service Worker registered', reg);
            }).catch(err => console.log('SW registration failed', err));
        }

        // ================================================================
        // MODAL OVERLAY CLOSE ON BACKDROP CLICK
        // ================================================================
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
            });
        });

        // ================================================================
        // CHAT INPUT AUTO-RESIZE + ENTER KEY
        // ================================================================
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            chatSendBtn.disabled = this.value.trim().length === 0;
            if (currentChat && currentChat.type === 'private') {
                if (!isTyping) {
                    sendTypingIndicator(true);
                    isTyping = true;
                }
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    sendTypingIndicator(false);
                    isTyping = false;
                }, 1000);
            }
        });

        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (this.value.trim().length > 0) {
                    sendMessage();
                }
            }
        });

        chatInput.addEventListener('focus', scrollToBottom);

        // ================================================================
        // EMOJI PICKER
        // ================================================================
        const emojiPicker = document.querySelector('emoji-picker');
        if (emojiPicker) {
            emojiPicker.addEventListener('emoji-click', event => {
                const chatInput = document.getElementById('chatInput');
                if (chatInput) {
                    chatInput.value += event.detail.unicode;
                    chatInput.focus();
                    chatInput.dispatchEvent(new Event('input'));
                }
            });
        }

        // ================================================================
        // WINDOW EVENTS
        // ================================================================
        window.addEventListener('beforeunload', () => {
            cleanupListeners();
        });

        console.log('✅ FuelRadar Admin with Chat/Call system ready');
    </script>

</body>
</html>
